valorant_stats:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('SUPABASE_DB_HOST') }}"
      port: "{{ env_var('SUPABASE_DB_PORT', '5432') | int }}"
      user: "{{ env_var('SUPABASE_DB_USER') }}"
      password: "{{ env_var('SUPABASE_DB_PASSWORD', '') }}"
      dbname: "{{ env_var('SUPABASE_DB_NAME') }}"
      schema: "{{ env_var('DBT_SUPABASE_SCHEMA', 'analytics') }}"
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"
      sslmode: "{{ env_var('SUPABASE_DB_SSLMODE', 'require') }}"